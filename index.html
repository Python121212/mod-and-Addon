<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOD Engine v2.2 - Logic Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --neon: #00e5ff; --bg: #0a0a12; --card: #151525; --text: #d1d1e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Fira Code', 'Cascadia Code', monospace; background: var(--bg); color: var(--text); padding: 10px; }
        
        .app-container { max-width: 1000px; margin: 0 auto; background: var(--card); border: 1px solid #2a2a45; border-radius: 15px; overflow: hidden; display: flex; flex-direction: column; height: 95vh; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        
        header { padding: 25px; background: #1a1a2e; border-bottom: 2px solid var(--neon); text-align: center; }
        h1 { font-size: 1.4rem; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        .workspace { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #2a2a45; flex-grow: 1; overflow: hidden; }
        @media (max-width: 800px) { .workspace { grid-template-columns: 1fr; } }

        .panel { background: var(--card); padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 操作エリア */
        .upload-zone { border: 2px dashed #3a3a5a; border-radius: 10px; padding: 30px; text-align: center; margin-bottom: 20px; transition: 0.3s; }
        .upload-zone:hover { border-color: var(--neon); background: rgba(0,229,255,0.05); }
        
        .action-btns { display: grid; grid-template-columns: 1fr; gap: 10px; }
        button { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        .run-btn { background: var(--neon); color: #000; }
        .save-btn { background: #7000ff; color: #fff; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* 解析ログエリア */
        #log-output { flex-grow: 1; background: #000; padding: 15px; border-radius: 5px; font-size: 11px; overflow-y: auto; color: #00ff41; white-space: pre-wrap; border: 1px solid #111; }
        .hit { color: #f0f; font-weight: bold; } /* 重要な発見 */
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>MOD ANALYSIS ENGINE V2.2</h1>
        <p style="font-size: 10px; color: #666;">Code Level Scanning & Protocol Mapping</p>
    </header>

    <div class="workspace">
        <div class="panel">
            <div class="upload-zone" id="drop-area">
                <p>JARファイルをドロップ</p>
                <input type="file" id="modFile" accept=".jar" style="margin-top: 10px;">
            </div>
            <div class="action-btns">
                <button id="runBtn" onclick="analyzeMod()" class="run-btn">解析 & コードスキャン開始</button>
                <button id="dlBtn" onclick="downloadAddon()" class="save-btn" disabled>統合版パックを保存 (.mcpack)</button>
            </div>
            <div id="stats" style="margin-top: 15px; font-size: 12px; color: var(--neon);"></div>
        </div>

        <div class="panel">
            <div id="log-output">>> システム待機中...</div>
        </div>
    </div>
</div>

<script>
    let finalZip = null;
    let packInfo = { name: "unknown", id: "mod" };

    function writeLog(text, isHit = false) {
        const out = document.getElementById('log-output');
        const span = document.createElement('span');
        if (isHit) span.className = 'hit';
        span.innerText = `[${new Date().toLocaleTimeString()}] ${text}\n`;
        out.appendChild(span);
        out.scrollTop = out.scrollHeight;
    }

    async function analyzeMod() {
        const fileInput = document.getElementById('modFile');
        const stats = document.getElementById('stats');
        if (!fileInput.files[0]) return;

        try {
            writeLog(">>> ディープスキャン・シーケンス開始...");
            const jar = await JSZip.loadAsync(fileInput.files[0]);
            const addon = new JSZip();
            let itemCount = 0;
            let soundPaths = [];

            // 1. コード・ロジック・スキャン (.classファイルを解析)
            for (const path in jar.files) {
                const file = jar.files[path];
                
                // クラスファイルから文字列を抽出して設定を予測
                if (path.endsWith(".class")) {
                    const content = await file.async("uint8array");
                    const decoded = new TextDecoder().decode(content.slice(0, 5000)); // 先頭部分をスキャン
                    
                    // サウンド定義のヒントを探す
                    if (decoded.includes("sounds/")) {
                        writeLog(`[CODE] 内部サウンド参照を検出: ${path}`, true);
                    }
                    // GUI座標のヒントを探す
                    if (decoded.includes("RenderSystem") || decoded.includes("GuiGraphics")) {
                        writeLog(`[CODE] GUI描画ロジックを特定: ${path}`);
                    }
                }

                // 2. リソース変換 (PNG / JSON)
                if (path.endsWith(".png")) {
                    const blob = await file.async("blob");
                    const name = path.split('/').pop();
                    let dest = "";
                    
                    if (path.includes("textures/item/")) {
                        dest = "textures/items/" + name;
                        itemCount++;
                    } else if (path.includes("textures/gui/")) {
                        dest = "textures/gui/" + name;
                        writeLog(`[GUI] 高度なテクスチャを救出: ${name}`, true);
                    } else {
                        dest = "textures/" + name;
                    }
                    addon.file(dest, blob);
                }

                // 3. サウンドJSONの解析
                if (path.endsWith("sounds.json")) {
                    writeLog("[JSON] サウンド定義ファイルを発見。変換リストに追加。");
                    const raw = await file.async("string");
                    addon.file("sounds/sound_definitions.json", raw); // 簡易統合
                }
            }

            // 4. 統合版マニフェストの自動生成
            const rpUUID = crypto.randomUUID();
            const manifest = {
                "format_version": 2,
                "header": {
                    "name": "Converted: " + fileInput.files[0].name.split('-')[0],
                    "description": "Deep Scanned Java Mod",
                    "uuid": rpUUID,
                    "version": [1, 0, 0],
                    "min_engine_version": [1, 21, 0]
                },
                "modules": [{ "type": "resources", "uuid": crypto.randomUUID(), "version": [1, 0, 0] }]
            };
            addon.file("manifest.json", JSON.stringify(manifest, null, 4));

            finalZip = addon;
            stats.innerText = `検出アイテム: ${itemCount} | コード解析済`;
            document.getElementById('dlBtn').disabled = false;
            writeLog(">>> 解析完了。全データを統合版プロトコルへ再構築しました。", true);

        } catch (e) {
            writeLog("!!! エラー発生: " + e.message);
        }
    }

    async function downloadAddon() {
        const b = await finalZip.generateAsync({type:"blob"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(b);
        a.download = "Converted_Addon.mcpack";
        a.click();
    }
</script>

</body>
</html>
