<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MOD Engine v3.1 - ATOMIC FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 50px; }
        .emergency-box { border: 2px solid #0f0; padding: 30px; display: inline-block; border-radius: 10px; background: #111; }
        button { background: #0f0; color: #000; border: none; padding: 20px 40px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 18px; }
        #log { margin-top: 20px; color: #888; font-size: 12px; }
    </style>
</head>
<body>

<div class="emergency-box">
    <h1>EMERGENCY REPAIR v3.1</h1>
    <p>「有効なZIPではありません」を強制突破します</p>
    
    <input type="file" id="modFile" accept=".jar">
    <br>
    <button onclick="emergencyBuild()">変換 & .mcpack発行</button>
    
    <div id="log">JARを選択してボタンを押してください</div>
</div>

<script>
    async function emergencyBuild() {
        const fileInput = document.getElementById('modFile');
        const log = document.getElementById('log');
        if (!fileInput.files[0]) return alert("ファイルを選択してください");

        log.innerText = "⏳ 構築中...";

        try {
            const jar = await JSZip.loadAsync(fileInput.files[0]);
            const addon = new JSZip();
            
            // 1. マニフェスト作成 (ここが命)
            const manifest = {
                "format_version": 2,
                "header": {
                    "name": "Emergency_Fix_" + Math.floor(Math.random() * 1000),
                    "uuid": crypto.randomUUID(),
                    "version": [1, 0, 0],
                    "min_engine_version": [1, 21, 0]
                },
                "modules": [{
                    "type": "resources",
                    "uuid": crypto.randomUUID(),
                    "version": [1, 0, 0]
                }]
            };
            addon.file("manifest.json", JSON.stringify(manifest));

            // 2. テクスチャを「ルート」に直接入れる (階層エラー回避)
            for (const path in jar.files) {
                if (path.endsWith(".png")) {
                    const blob = await jar.files[path].async("blob");
                    const name = path.split('/').pop().toLowerCase().replace(/[^a-z0-9.]/g, "_");
                    addon.file(name, blob); // フォルダに入れず、バラで置く
                }
            }

            // 3. ZIP生成 (一番安全な設定)
            const content = await addon.generateAsync({
                type: "blob",
                compression: "STORE", // 圧縮なし
                mimeType: "application/octet-stream"
            });

            const url = URL.createObjectURL(content);
            const a = document.createElement("a");
            a.href = url;
            a.download = "Fix_" + Date.now() + ".mcpack";
            document.body.appendChild(a);
            a.click();
            
            log.innerText = "✅ 完了！このファイルで試してください。";
        } catch (e) {
            log.innerText = "❌ 失敗: " + e.message;
        }
    }
</script>
</body>
</html>
