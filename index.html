<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MOD Engine v3.3 - Force Export</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --sound-blue: #00d2ff; --bg: #050505; }
        body { background: var(--bg); color: var(--sound-blue); font-family: 'Courier New', monospace; text-align: center; padding: 30px; }
        .main-card { border: 1px solid var(--sound-blue); padding: 25px; display: inline-block; border-radius: 15px; background: #0a0a0a; box-shadow: 0 0 20px rgba(0,210,255,0.2); }
        button { background: var(--sound-blue); color: #000; border: none; padding: 18px 35px; font-weight: bold; cursor: pointer; margin-top: 20px; border-radius: 5px; width: 100%; transition: 0.2s; }
        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        #status-log { margin-top: 15px; color: #555; font-size: 11px; text-transform: uppercase; }
        input[type="file"] { margin-bottom: 20px; color: #888; }
    </style>
</head>
<body>

<div class="main-card">
    <h2 style="margin-top:0">MOD ENGINE v3.3</h2>
    <p style="font-size:12px; color:#aaa;">[SOUND + ATOMIC FIX + EXTENSION LOCK]</p>
    
    <input type="file" id="modFile" accept=".jar">
    <button onclick="executeSecureBuild()">解析 & .mcpack を強制発行</button>
    
    <div id="status-log">Ready. JARをスキャンして音と画像を抽出します。</div>
</div>

<script>
    async function executeSecureBuild() {
        const fileInput = document.getElementById('modFile');
        const log = document.getElementById('status-log');
        if (!fileInput.files[0]) return alert("JARを選択してください");

        log.innerText = "Processing: 構築中...";
        const jar = await JSZip.loadAsync(fileInput.files[0]);
        const addon = new JSZip();
        
        // 1. マニフェスト (UUIDを毎回変えて衝突回避)
        const manifest = {
            "format_version": 2,
            "header": { "name": "Converted_Pack_" + Date.now(), "uuid": crypto.randomUUID(), "version": [1,0,0], "min_engine_version": [1,21,0] },
            "modules": [{ "type": "resources", "uuid": crypto.randomUUID(), "version": [1,0,0] }]
        };
        addon.file("manifest.json", JSON.stringify(manifest));

        let soundDefs = { "individual_event_sounds": { "events": {} } };

        // 2. 音と画像の救出
        for (const path in jar.files) {
            const file = jar.files[path];
            if (file.dir) continue;

            const fileName = path.split('/').pop().toLowerCase().replace(/[^a-z0-9.]/g, "_");

            if (path.endsWith(".ogg")) {
                const blob = await file.async("blob");
                addon.file("sounds/mod/" + fileName, blob);
                soundDefs.individual_event_sounds.events["mod." + fileName.replace(".ogg", "")] = {
                    "sounds": ["sounds/mod/" + fileName.replace(".ogg", "")]
                };
            } else if (path.endsWith(".png")) {
                const blob = await file.async("blob");
                addon.file("textures/items/" + fileName, blob);
            }
        }
        
        addon.file("sounds.json", JSON.stringify(soundDefs, null, 4));

        // 3. 強制ダウンロード処理 (拡張子を固定)
        try {
            const content = await addon.generateAsync({
                type: "blob",
                compression: "STORE",
                mimeType: "application/octet-stream" // ZIPと誤認させないためのMIME
            });

            const url = URL.createObjectURL(content);
            const a = document.createElement("a");
            a.href = url;
            // .zipを付けさせないためのファイル名指定
            a.download = "ConvertedMod.mcpack"; 
            document.body.appendChild(a);
            a.click();
            
            setTimeout(() => {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
                log.innerText = "SUCCESS: フォルダから .mcpack を開いてください";
            }, 100);
        } catch (e) {
            log.innerText = "ERROR: " + e.message;
        }
    }
</script>
</body>
</html>
