<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOD Engine v2.7.3 - Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --main: #ff007b; --bg: #0d1117; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; padding: 20px; text-align: center; }
        .box { max-width: 600px; margin: 0 auto; background: #161b22; padding: 30px; border-radius: 15px; border: 2px solid var(--main); }
        button { background: var(--main); color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; width: 100%; }
        button:disabled { background: #333; }
        #status { margin-top: 20px; font-size: 14px; color: #8b949e; }
        input { margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:var(--main)">MOD FIX ENGINE v2.7.3</h2>
    <p style="font-size: 12px;">「有効なZIPではありません」回避モデル</p>
    
    <input type="file" id="modFile" accept=".jar">
    <button id="runBtn" onclick="reconstruct()">変換 & ダウンロード</button>
    <div id="status">JARファイルを選択してください</div>
</div>

<script>
    async function reconstruct() {
        const fileInput = document.getElementById('modFile');
        const status = document.getElementById('status');
        const runBtn = document.getElementById('runBtn');

        if (!fileInput.files[0]) return alert("ファイルを選んでください");
        
        runBtn.disabled = true;
        status.innerText = "⏳ 変換中...";

        try {
            const jar = await JSZip.loadAsync(fileInput.files[0]);
            const addon = new JSZip();
            
            let texCount = 0;
            let textureData = {};

            // 1. テクスチャのみを抽出 (一番安全なルート)
            for (const path in jar.files) {
                if (path.endsWith(".png") && !path.includes("META-INF")) {
                    const blob = await jar.files[path].async("blob");
                    const fileName = path.split('/').pop().toLowerCase().replace(/[^a-z0-9.]/g, "_");
                    
                    // 確実に認識させるためルート直下のtexturesフォルダへ
                    addon.file("textures/items/" + fileName, blob);
                    textureData[fileName.replace(".png", "")] = { "textures": "textures/items/" + fileName.replace(".png", "") };
                    texCount++;
                }
            }

            // 2. 必須ファイルの作成 (リソースパック形式に固定)
            const manifest = {
                "format_version": 2,
                "header": {
                    "name": "Fixed_Mod_" + Date.now(),
                    "description": "Converted by Gemini Engine",
                    "uuid": crypto.randomUUID(),
                    "version": [1, 0, 0],
                    "min_engine_version": [1, 21, 0]
                },
                "modules": [
                    {
                        "type": "resources",
                        "uuid": crypto.randomUUID(),
                        "version": [1, 0, 0]
                    }
                ]
            };

            // フォルダ階層を作らず、ルートに直接配置
            addon.file("manifest.json", JSON.stringify(manifest, null, 4));
            addon.file("textures/item_texture.json", JSON.stringify({ "resource_pack_name": "pack", "texture_name": "atlas.items", "texture_data": textureData }, null, 4));

            status.innerText = "⏳ ZIPパッケージ生成中...";

            // 3. 互換性重視のZIP生成 (圧縮レベル0 = Store)
            const content = await addon.generateAsync({
                type: "blob",
                mimeType: "application/octet-stream",
                compression: "STORE" // 圧縮しないことで破損判定を回避
            });

            const url = URL.createObjectURL(content);
            const a = document.createElement("a");
            a.href = url;
            a.download = "Fixed_Mod.mcpack"; // .mcpackに変更
            document.body.appendChild(a);
            a.click();
            
            status.innerText = `✅ 成功！画像 ${texCount} 枚を救出。\nFixed_Mod.mcpack を開いてください。`;

        } catch (e) {
            status.innerText = "❌ エラー: " + e.message;
            console.error(e);
        } finally {
            runBtn.disabled = false;
        }
    }
</script>
</body>
</html>
