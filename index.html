<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOD Converter v2.1 - Responsive Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #0d1117; --card: #161b22; --text: #c9d1d9; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', sans-serif; 
            background: var(--bg); color: var(--text); 
            line-height: 1.6; padding: 10px;
        }

        .container { 
            max-width: 900px; margin: 0 auto; 
            background: var(--card); border: 1px solid #30363d; 
            border-radius: 12px; overflow: hidden;
            display: flex; flex-direction: column;
            min-height: 95vh;
        }

        header { 
            padding: 20px; text-align: center; 
            background: linear-gradient(135deg, #1f2937, #111827);
            border-bottom: 2px solid var(--accent);
        }
        h1 { color: var(--accent); font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }

        /* 入力エリア */
        .controls { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .file-input-wrapper {
            position: relative; overflow: hidden; display: inline-block;
            border: 2px dashed #30363d; border-radius: 8px; padding: 20px; text-align: center;
        }
        input[type="file"] { font-size: 14px; width: 100%; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { 
            padding: 15px; border-radius: 8px; border: none; font-weight: bold; 
            cursor: pointer; transition: 0.2s; font-size: 0.9rem;
        }
        .primary-btn { background: var(--accent); color: #0d1117; }
        .download-btn { background: #238636; color: white; }
        button:disabled { background: #30363d; color: #8b949e; cursor: not-allowed; }
        button:active { transform: scale(0.98); }

        /* ステータスとログ */
        .status-bar { padding: 10px 20px; background: #000; font-size: 0.85rem; color: var(--accent); }
        #terminal { 
            flex-grow: 1; background: #000; color: #00ff41; padding: 15px; 
            font-family: 'Consolas', monospace; font-size: 12px; 
            overflow-y: auto; border-top: 1px solid #30363d;
            height: 300px; /* PCでは可変、スマホでは最低限を確保 */
        }

        /* スマホ向けの調整 */
        @media (max-width: 600px) {
            body { padding: 5px; }
            h1 { font-size: 1.2rem; }
            .btn-group { grid-template-columns: 1fr; }
            #terminal { height: 250px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Mod Converter v2.1</h1>
        <p style="font-size: 12px; color: #8b949e;">Universal JAR to MCADDON Protocol</p>
    </header>

    <div class="controls">
        <div class="file-input-wrapper">
            <input type="file" id="modFile" accept=".jar">
        </div>
        <div class="btn-group">
            <button onclick="processMod()" class="primary-btn">DEEP CONVERT</button>
            <button id="dlBtn" onclick="download()" class="download-btn" disabled>SAVE .MCPACK</button>
        </div>
    </div>

    <div class="status-bar" id="status">System: Ready to Scan</div>
    <div id="terminal">>> Waiting for JAR file...</div>
</div>

<script>
    let finalZip = null;
    let packName = "converted_mod";

    function log(msg, color = '#00ff41') {
        const term = document.getElementById('terminal');
        const line = document.createElement('div');
        line.style.color = color;
        line.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        term.appendChild(line);
        term.scrollTop = term.scrollHeight;
    }

    async function processMod() {
        const fileInput = document.getElementById('modFile');
        const dlBtn = document.getElementById('dlBtn');
        const status = document.getElementById('status');

        if (!fileInput.files[0]) return;
        
        try {
            status.innerText = "Status: Processing...";
            log("--- Scanning Start ---", '#00ffcc');
            
            const javaZip = await JSZip.loadAsync(fileInput.files[0]);
            const addon = new JSZip();
            let itemTex = { "resource_pack_name": "converted", "texture_name": "atlas.items", "texture_data": {} };
            let count = 0;

            for (const path in javaZip.files) {
                const file = javaZip.files[path];
                if (file.dir) continue;

                // テクスチャ抽出 & 統合版パスへリマッピング
                if (path.endsWith(".png")) {
                    const blob = await file.async("blob");
                    const name = path.split('/').pop().replace(".png", "");
                    let dest = "";

                    if (name === "icon" || name === "logo") dest = "pack_icon.png";
                    else if (path.includes("/textures/")) {
                        dest = "textures/" + path.substring(path.indexOf("textures/") + 9);
                        itemTex.texture_data[name] = { "textures": dest.replace(".png", "") };
                    }

                    if (dest) {
                        addon.file(dest, blob);
                        count++;
                    }
                }

                // 言語・設定ファイルからの情報取得
                if (path.endsWith("mods.toml") || path.endsWith("fabric.mod.json")) {
                    const txt = await file.async("string");
                    packName = txt.match(/displayName\s*=\s*["']([^"']+)["']/) ? txt.match(/displayName\s*=\s*["']([^"']+)["']/)[1] : packName;
                    log(`Detected Mod: ${packName}`, '#00ffcc');
                }
            }

            // Manifest生成
            const manifest = {
                "format_version": 2,
                "header": { "name": packName, "uuid": crypto.randomUUID(), "version": [1,0,0], "min_engine_version": [1,21,0] },
                "modules": [{ "type": "resources", "uuid": crypto.randomUUID(), "version": [1,0,0] }]
            };
            addon.file("manifest.json", JSON.stringify(manifest, null, 4));
            addon.file("textures/item_texture.json", JSON.stringify(itemTex, null, 4));

            finalZip = addon;
            log(`Success: Extracted ${count} textures.`, '#00ff41');
            status.innerText = "Status: Complete";
            dlBtn.disabled = false;

        } catch (e) {
            log("Error: " + e.message, "#ff4444");
            status.innerText = "Status: Error";
        }
    }

    async function download() {
        const blob = await finalZip.generateAsync({type:"blob"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `${packName.replace(/\s/g, '_')}.mcpack`;
        a.click();
    }
</script>
</body>
</html>
