<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MOD Engine v4.1 - PF Total Override</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --pf: #8bc34a; --bg: #050505; }
        body { background: var(--bg); color: var(--pf); font-family: 'Consolas', monospace; text-align: center; padding: 20px; }
        .terminal { border: 2px solid var(--pf); padding: 20px; display: inline-block; border-radius: 10px; background: #111; width: 95%; max-width: 800px; }
        button { background: var(--pf); color: #000; border: none; padding: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; border-radius: 5px; font-size: 1.1rem; }
        #log { margin-top: 15px; color: #fff; font-size: 10px; text-align: left; height: 300px; overflow-y: auto; background: #000; padding: 10px; border: 1px solid #333; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="terminal">
    <h2>PF TOTAL OVERRIDE v4.1</h2>
    <p style="font-size:11px; color:#aaa;">[Presence Footsteps 完全移植モデル]</p>
    
    <input type="file" id="modFile" accept=".jar">
    <button onclick="pfTotalConversion()">全アセット救出 & 強制置換パック生成</button>
    
    <div id="log">1. JARを選択してください。
2. ボタンを押すと、全ての「足音」をバニラに上書きします。</div>
</div>

<script>
    async function pfTotalConversion() {
        const fileInput = document.getElementById('modFile');
        const log = document.getElementById('log');
        if (!fileInput.files[0]) return;

        log.innerHTML = ">>> 変換プロセス開始...\n";
        const jar = await JSZip.loadAsync(fileInput.files[0]);
        const addon = new JSZip();
        
        const manifest = {
            "format_version": 2,
            "header": { "name": "PF_Total_Override", "uuid": crypto.randomUUID(), "version": [2,0,0], "min_engine_version": [1,21,0] },
            "modules": [{ "type": "resources", "uuid": crypto.randomUUID(), "version": [1,0,0] }]
        };
        addon.file("manifest.json", JSON.stringify(manifest));

        let soundDefs = { "format_version": "1.14.0", "sound_definitions": {} };
        let soundGroups = {};

        // 1. JAR内の全ファイルをスキャンしてグループ化
        for (const path in jar.files) {
            if (path.endsWith(".ogg")) {
                const blob = await jar.files[path].async("blob");
                
                // 統合版での保存パスを生成
                const safeName = path.replace(/[^a-zA-Z0-9]/g, "_");
                const internalPath = "sounds/pf_final/" + safeName;
                addon.file(internalPath + ".ogg", blob);

                // 音の種類（石、草、木など）を判定
                let type = "default";
                if (path.includes("stone")) type = "stone";
                else if (path.includes("grass")) type = "grass";
                else if (path.includes("wood")) type = "wood";
                else if (path.includes("gravel")) type = "gravel";
                else if (path.includes("sand")) type = "sand";
                else if (path.includes("water")) type = "water";

                if (!soundGroups[type]) soundGroups[type] = [];
                soundGroups[type].push(internalPath);
                
                log.innerHTML += `SAVED: ${path}\n`;
            }
        }

        // 2. バニラの足音イベントに「複数の音」を紐付け
        const vanillaEvents = ["step.stone", "step.grass", "step.wood", "step.gravel", "step.sand", "step.water"];
        
        for (const event of vanillaEvents) {
            const type = event.split(".")[1];
            if (soundGroups[type]) {
                soundDefs.sound_definitions[event] = {
                    "category": "player",
                    "sounds": soundGroups[type].map(p => ({ "name": p, "volume": 1.0, "load_on_low_memory": true }))
                };
                log.innerHTML += `MAPPED: ${event} (${soundGroups[type].length} sounds)\n`;
            }
        }

        addon.file("sound_definitions.json", JSON.stringify(soundDefs, null, 4));

        try {
            const content = await addon.generateAsync({ type: "blob", compression: "STORE", mimeType: "application/octet-stream" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(content);
            a.download = "PF_Final_Fix.mcpack"; 
            a.click();
            log.innerHTML += `\n>>> 完了！PF_Final_Fix.mcpack をインポートしてください。`;
        } catch (e) {
            log.innerHTML += `\nERROR: ${e.message}`;
        }
    }
</script>
</body>
</html>
