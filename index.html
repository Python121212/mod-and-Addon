<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Java to Bedrock Converter - Phase 1.4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0f0c29; --card: #24243e; --text: #ffffff; }
        body { font-family: 'Consolas', monospace; background: linear-gradient(to right, #0f0c29, #302b63, #24243e); color: var(--text); padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--primary); }
        .box { border: 1px solid #444; padding: 15px; margin: 15px 0; border-radius: 10px; }
        button { background: var(--primary); color: #000; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #555; cursor: not-allowed; }
        #output { background: #000; color: #0f0; padding: 15px; border-radius: 5px; white-space: pre-wrap; font-size: 11px; height: 300px; overflow-y: scroll; border: 1px solid var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1>CONVERTER ENGINE v1.4</h1>
    <div class="box">
        <input type="file" id="modFile" accept=".jar">
        <button onclick="processMod()">RUN CONVERSION</button>
        <button id="downloadBtn" onclick="downloadAddon()" disabled>DOWNLOAD .MCPACK</button>
    </div>
    <div id="status">READY.</div>
    <div id="output">LOG WINDOW: Waiting for file...</div>
</div>

<script>
    let generatedZip = null;
    let modDisplayName = "converted_addon";

    async function processMod() {
        const fileInput = document.getElementById('modFile');
        const output = document.getElementById('output');
        const status = document.getElementById('status');
        const downloadBtn = document.getElementById('downloadBtn');

        if (!fileInput.files[0]) return;
        try {
            status.innerText = "PROCESSING...";
            const javaZip = await JSZip.loadAsync(fileInput.files[0]);
            const addonZip = new JSZip();
            let log = ">> STARTING EXTRACTION\n";

            // 1. マニフェスト解析
            const tomlFile = javaZip.file(/mods\.toml$/i)[0];
            const tomlText = await tomlFile.async("string");
            const modId = tomlText.match(/modId\s*=\s*["']([^"']+)["']/)?.[1] || "unknown";
            modDisplayName = tomlText.match(/displayName\s*=\s*["']([^"']+)["']/)?.[1] || modId;

            const manifest = {
                "format_version": 2,
                "header": { "name": modDisplayName, "uuid": crypto.randomUUID(), "version": [1, 0, 0], "min_engine_version": [1, 21, 0] },
                "modules": [{ "type": "resources", "uuid": crypto.randomUUID(), "version": [1, 0, 0] }]
            };
            addonZip.file("manifest.json", JSON.stringify(manifest, null, 4));

            // 2. テクスチャ & 名簿
            let itemTex = { "resource_pack_name": "converted", "texture_name": "atlas.items", "texture_data": {} };
            const files = javaZip.files;

            for (const path in files) {
                if (path.endsWith(".png")) {
                    const blob = await files[path].async("blob");
                    let newPath = "";
                    if (path.toLowerCase().endsWith("icon.png")) newPath = "pack_icon.png";
                    else if (path.includes("/textures/item/")) {
                        const id = path.split('/').pop().replace(".png", "");
                        newPath = "textures/items/" + id + ".png";
                        itemTex.texture_data[id] = { "textures": "textures/items/" + id };
                        log += `>> MAPPED ITEM: ${id}\n`;
                    }
                    if (newPath) addonZip.file(newPath, blob);
                }
            }

            addonZip.file("textures/item_texture.json", JSON.stringify(itemTex, null, 4));
            generatedZip = addonZip;
            output.innerText = log + "\n>> SUCCESS: ITEM_TEXTURE.JSON GENERATED";
            status.innerText = "COMPLETE.";
            downloadBtn.disabled = false;
        } catch (e) { status.innerText = "ERROR: " + e.message; }
    }

    async function downloadAddon() {
        const b = await generatedZip.generateAsync({type:"blob"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(b);
        a.download = `${modDisplayName}.mcpack`;
        a.click();
    }
</script>
</body>
</html>
