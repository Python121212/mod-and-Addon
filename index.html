<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MOD Engine v4.0 - Presence Footsteps Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --pf-green: #4caf50; --bg: #0d0d0d; }
        body { background: var(--bg); color: var(--pf-green); font-family: 'Consolas', monospace; text-align: center; padding: 20px; }
        .panel { border: 2px solid var(--pf-green); padding: 25px; display: inline-block; border-radius: 15px; background: #1a1a1a; width: 90%; max-width: 700px; box-shadow: 0 0 20px rgba(76, 175, 80, 0.4); }
        button { background: var(--pf-green); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; border-radius: 5px; text-transform: uppercase; }
        #log { margin-top: 15px; color: #fff; font-size: 11px; text-align: left; height: 250px; overflow-y: auto; background: #000; padding: 10px; border: 1px solid #333; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="panel">
    <h2>PRESENCE FOOTSTEPS CONVERTER v4.0</h2>
    <p style="font-size:11px; color:#aaa;">[Presence Footsteps 構造解析モデル]</p>
    
    <input type="file" id="modFile" accept=".jar">
    <button onclick="convertPresenceFootsteps()">MOD独自の音響定義を統合版へ移植</button>
    
    <div id="log">READY: Presence Footsteps の JAR を選択してください...</div>
</div>

<script>
    async function convertPresenceFootsteps() {
        const fileInput = document.getElementById('modFile');
        const log = document.getElementById('log');
        if (!fileInput.files[0]) return;

        log.innerHTML = ">>> Presence Footsteps 深層解析開始...\n";
        const jar = await JSZip.loadAsync(fileInput.files[0]);
        const addon = new JSZip();
        
        const manifest = {
            "format_version": 2,
            "header": { "name": "PF_Sound_Restoration", "uuid": crypto.randomUUID(), "version": [1,0,0], "min_engine_version": [1,21,0] },
            "modules": [{ "type": "resources", "uuid": crypto.randomUUID(), "version": [1,0,0] }]
        };
        addon.file("manifest.json", JSON.stringify(manifest));

        let soundDefs = { "format_version": "1.14.0", "sound_definitions": {} };
        let count = 0;

        // 1. 全ての .ogg を救出し、正規のパスへ再配置
        for (const path in jar.files) {
            if (path.endsWith(".ogg")) {
                const blob = await jar.files[path].async("blob");
                
                // Presence Footsteps の複雑なパスを単純化
                // 例: assets/presencefootsteps/sounds/stone/step1.ogg -> sounds/pf/stone_step1.ogg
                const fileName = path.split('/').pop().replace(".ogg", "");
                const folderName = path.split('/').slice(-2, -1)[0];
                const internalPath = `sounds/pf/${folderName}_${fileName}`;
                
                addon.file(internalPath + ".ogg", blob);

                // 全ての音を個別のサウンドイベントとして登録
                const eventName = `pf.${folderName}.${fileName}`;
                soundDefs.sound_definitions[eventName] = {
                    "category": "player",
                    "sounds": [{ "name": internalPath, "stream": false, "volume": 1.0 }]
                };

                // バニラの足音をこのMODの「stone」や「grass」系の音で強制上書き
                if (path.includes("stone") && (path.includes("step") || path.includes("walk"))) {
                    soundDefs.sound_definitions["step.stone"] = soundDefs.sound_definitions[eventName];
                }
                if (path.includes("grass") && (path.includes("step") || path.includes("walk"))) {
                    soundDefs.sound_definitions["step.grass"] = soundDefs.sound_definitions[eventName];
                }
                if (path.includes("wood") && (path.includes("step") || path.includes("walk"))) {
                    soundDefs.sound_definitions["step.wood"] = soundDefs.sound_definitions[eventName];
                }

                count++;
                log.innerHTML += `CONVERTED: ${path} -> ${eventName}\n`;
                log.scrollTop = log.scrollHeight;
            }
        }
        
        addon.file("sound_definitions.json", JSON.stringify(soundDefs, null, 4));

        try {
            const content = await addon.generateAsync({ type: "blob", compression: "STORE", mimeType: "application/octet-stream" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(content);
            a.download = "PF_Sound_Fix.mcpack"; 
            a.click();
            log.innerHTML += `\n>>> 完了！ ${count} 個の PF 専用音源を統合版に適合させました。`;
        } catch (e) {
            log.innerHTML += `\nERROR: ${e.message}`;
        }
    }
</script>
</body>
</html>
