<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>PF JSON REBUILDER v4.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; }
        .container { border: 2px solid #00ff00; padding: 20px; margin: 20px auto; width: 80%; background: #111; }
        button { background: #00ff00; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; width: 100%; }
        #console { text-align: left; background: #000; padding: 10px; height: 200px; overflow-y: scroll; font-size: 12px; border: 1px solid #333; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2>PF JSON REBUILDER v4.5</h2>
    <p>足りない定義を自動生成し、パスを最短化します。</p>
    <input type="file" id="modFile" accept=".jar">
    <button onclick="rebuildJSON()">定義ファイル完全再構築</button>
    <div id="console">>>> ログ待機中...</div>
</div>

<script>
    async function rebuildJSON() {
        const fileInput = document.getElementById('modFile');
        const consoleLog = document.getElementById('console');
        if (!fileInput.files[0]) return;

        const jar = await JSZip.loadAsync(fileInput.files[0]);
        const addon = new JSZip();
        
        // 最小構成マニフェスト
        addon.file("manifest.json", JSON.stringify({
            "format_version": 2,
            "header": { "name": "PF_Rebuilt_v45", "uuid": crypto.randomUUID(), "version": [4,5,0], "min_engine_version": [1,21,0] },
            "modules": [{ "type": "resources", "uuid": crypto.randomUUID(), "version": [1,0,0] }]
        }));

        let soundDefs = { "format_version": "1.14.0", "sound_definitions": {} };
        const categories = ["stone", "grass", "wood", "gravel", "sand", "snow", "water"];

        for (const path in jar.files) {
            if (path.endsWith(".ogg")) {
                const blob = await jar.files[path].async("blob");
                
                // 1. パスの最適化 (sounds/ フォルダ直下に短い名前で配置)
                const soundId = Math.random().toString(36).substring(7);
                const shortPath = `s/${soundId}`; 
                addon.file(`sounds/${shortPath}.ogg`, blob); // 物理ファイル

                // 2. カテゴリ判定
                let cat = categories.find(c => path.toLowerCase().includes(c)) || "stone";
                let event = `step.${cat}`;

                if (!soundDefs.sound_definitions[event]) {
                    soundDefs.sound_definitions[event] = { "category": "player", "sounds": [] };
                }

                // 3. JSON記述の最適化 (nameのみの文字列配列にする)
                if (soundDefs.sound_definitions[event].sounds.length < 15) {
                    soundDefs.sound_definitions[event].sounds.push(shortPath);
                }
                consoleLog.innerHTML += `Mapping: ${path} -> ${event}\n`;
            }
        }

        // 4. 空白を一切入れない Minify JSON
        addon.file("sound_definitions.json", JSON.stringify(soundDefs));

        const content = await addon.generateAsync({ type: "blob", compression: "STORE" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(content);
        a.download = "PF_Rebuilt.mcpack";
        a.click();
        consoleLog.innerHTML += "\n>>> 再構築完了！余計な余白を削除し、パスを修正しました。";
    }
</script>
</body>
</html>
