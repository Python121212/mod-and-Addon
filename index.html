<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOD Engine v2.6 - 3D Geometry Transpiler</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --geo-blue: #00d2ff; --bg: #050a10; --card: #1c222d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px 25px; background: #000; border-bottom: 2px solid var(--geo-blue); display: flex; justify-content: space-between; align-items: center; }
        .main-container { display: grid; grid-template-columns: 1fr 1fr; flex-grow: 1; overflow: hidden; gap: 2px; background: #333; }
        .panel { background: var(--card); display: flex; flex-direction: column; padding: 15px; overflow: hidden; }
        .label { font-size: 11px; color: var(--geo-blue); text-transform: uppercase; margin-bottom: 10px; font-weight: bold; }
        textarea { flex-grow: 1; background: #000; color: #a5d6a7; border: 1px solid #333; padding: 10px; font-family: monospace; font-size: 12px; resize: none; outline: none; }
        .controls { padding: 20px; background: #0a0f16; display: flex; gap: 15px; border-top: 1px solid #333; }
        button { padding: 12px 25px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-convert { background: var(--geo-blue); color: #000; }
        .btn-save { background: #6200ea; color: #fff; }
        button:disabled { opacity: 0.2; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; letter-spacing: 1px;">3D MODEL CONVERTER v2.6</div>
    <div id="status" style="font-size: 12px; color: #888;">Ready for .json modeling</div>
</header>

<div class="main-container">
    <div class="panel">
        <div class="label">Java Edition Model (JSON)</div>
        <textarea id="java-json" placeholder='{"parent": "block/cube", "elements": [...]} ... またはJARを読み込み'></textarea>
    </div>
    <div class="panel">
        <div class="label">Bedrock Geometry (JSON)</div>
        <textarea id="be-json" readonly>// 変換後のジオメトリデータが表示されます</textarea>
    </div>
</div>

<div class="controls">
    <input type="file" id="modFile" accept=".jar,.json">
    <button class="btn-convert" onclick="convertGeometry()">3D GEOMETRY CONVERT</button>
    <button class="btn-save" id="dlBtn" onclick="downloadPack()" disabled>SAVE PACK</button>
</div>

<script>
    let finalZip = null;

    function javaToBedrock(javaModel) {
        try {
            const j = JSON.parse(javaModel);
            const beModel = {
                "format_version": "1.12.0",
                "minecraft:geometry": [{
                    "description": { "identifier": "geometry.converted_model", "texture_width": 16, "texture_height": 16, "visible_bounds_width": 1, "visible_bounds_height": 1, "visible_bounds_offset": [0, 0, 0] },
                    "bones": [{ "name": "root", "pivot": [8, 8, 8], "cubes": [] }]
                }]
            };

            if (j.elements) {
                j.elements.forEach(el => {
                    const from = el.from; // [x, y, z]
                    const to = el.to;
                    // Java座標[0-16]を統合版の相対座標へ変換
                    const size = [to[0]-from[0], to[1]-from[1], to[2]-from[2]];
                    const origin = [from[0], from[1], from[2]];

                    beModel["minecraft:geometry"][0].bones[0].cubes.push({
                        "origin": origin,
                        "size": size,
                        "uv": [0, 0] // 簡易UV設定
                    });
                });
            }
            return JSON.stringify(beModel, null, 4);
        } catch (e) { return "// エラー: 正しいJavaモデルJSONを読み込んでください。"; }
    }

    async function convertGeometry() {
        const fileInput = document.getElementById('modFile');
        const javaText = document.getElementById('java-json');
        const beText = document.getElementById('be-json');
        
        let targetJson = javaText.value;

        if (fileInput.files[0]) {
            const file = fileInput.files[0];
            if (file.name.endsWith(".jar")) {
                const jar = await JSZip.loadAsync(file);
                // モデルファイルを探す
                const modelFile = Object.keys(jar.files).find(p => p.includes("models/") && p.endsWith(".json"));
                if (modelFile) {
                    targetJson = await jar.files[modelFile].async("string");
                    javaText.value = targetJson;
                }
            } else {
                targetJson = await file.text();
                javaText.value = targetJson;
            }
        }

        beText.value = javaToBedrock(targetJson);
        document.getElementById('dlBtn').disabled = false;
        
        // パック作成
        const addon = new JSZip();
        addon.file("manifest.json", JSON.stringify({
            "format_version": 2,
            "header": { "name": "Geometry Converted", "uuid": crypto.randomUUID(), "version": [1,0,0] },
            "modules": [{ "type": "resources", "uuid": crypto.randomUUID(), "version": [1,0,0] }]
        }, null, 4));
        addon.file("models/entity/converted.geo.json", beText.value);
        finalZip = addon;
    }

    function downloadPack() {
        finalZip.generateAsync({type:"blob"}).then(b => {
            const a = document.createElement("a");
            a.href = URL.createObjectURL(b);
            a.download = "Converted_3D_Model.mcpack";
            a.click();
        });
    }
</script>
</body>
</html>
