<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MOD Converter v1.6 - Behavior Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --main: #ffca28; --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #e0e0e0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 15px; border-top: 5px solid var(--main); }
        h1 { color: var(--main); margin-bottom: 5px; }
        .sub { color: #888; margin-bottom: 25px; }
        button { background: var(--main); color: #000; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        button:disabled { background: #444; color: #777; transform: none; }
        #log { background: #000; color: #a5d6a7; padding: 15px; border-radius: 5px; height: 300px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 12px; margin-top: 20px; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <h1>CONVERTER PHASE 1.6: BEHAVIOR</h1>
    <p class="sub">アイテム定義(JSON)の自動生成エンジンを搭載</p>
    
    <input type="file" id="modFile" accept=".jar" style="margin-bottom: 20px;">
    <div>
        <button onclick="processMod()">RUN CONVERSION</button>
        <button id="downloadBtn" onclick="downloadAddon()" disabled>DOWNLOAD .MCADDON</button>
    </div>

    <div id="log">>> システムスタンバイ...</div>
</div>

<script>
    let generatedZip = null;
    let modDisplayName = "converted_addon";

    async function processMod() {
        const fileInput = document.getElementById('modFile');
        const log = document.getElementById('log');
        const downloadBtn = document.getElementById('downloadBtn');

        if (!fileInput.files[0]) return;
        
        try {
            log.innerText = ">> 変換シーケンス開始...\n";
            const javaZip = await JSZip.loadAsync(fileInput.files[0]);
            const addonZip = new JSZip();

            // 1. 基本情報の取得
            const tomlFile = javaZip.file(/mods\.toml$/i)[0];
            const tomlText = await tomlFile.async("string");
            const modId = tomlText.match(/modId\s*=\s*["']([^"']+)["']/)?.[1] || "mod";
            modDisplayName = tomlText.match(/displayName\s*=\s*["']([^"']+)["']/)?.[1] || modId;

            // 2. マニフェスト生成 (RP用とBP用の2種類が必要)
            const rpUUID = crypto.randomUUID();
            const bpUUID = crypto.randomUUID();
            
            // 簡易的にRP側のみ作成 (今回は実験のため)
            const manifest = {
                "format_version": 2,
                "header": { "name": modDisplayName, "uuid": rpUUID, "version": [1, 0, 0], "min_engine_version": [1, 21, 0] },
                "modules": [{ "type": "resources", "uuid": crypto.randomUUID(), "version": [1, 0, 0] }]
            };
            addonZip.file("manifest.json", JSON.stringify(manifest, null, 4));

            // 3. テクスチャ解析 & アイテム定義生成
            let itemTex = { "resource_pack_name": "converted", "texture_name": "atlas.items", "texture_data": {} };
            const files = javaZip.files;

            for (const path in files) {
                if (path.endsWith(".png") && path.includes("/textures/")) {
                    const blob = await files[path].async("blob");
                    const fileName = path.split('/').pop().replace(".png", "");
                    const internalPath = path.substring(path.indexOf("textures/"));

                    // テクスチャを配置
                    addonZip.file(internalPath, blob);

                    // もし「アイテム」フォルダにある画像なら、自動的にアイテム定義を作成
                    if (path.includes("/item/")) {
                        itemTex.texture_data[fileName] = { "textures": internalPath.replace(".png", "") };

                        // 【新機能】Behavior Pack 用のアイテム定義 JSON を作成
                        const itemDefinition = {
                            "format_version": "1.21.0",
                            "minecraft:item": {
                                "description": { "identifier": `${modId}:${fileName}` },
                                "components": {
                                    "minecraft:icon": fileName,
                                    "minecraft:display_name": { "value": fileName },
                                    "minecraft:stacked_by_data": true
                                }
                            }
                        };
                        // 統合版のアイテムフォルダへ配置
                        addonZip.file(`items/${fileName}.item.json`, JSON.stringify(itemDefinition, null, 4));
                        log.innerText += `>> アイテム定義生成: ${modId}:${fileName}\n`;
                    }
                }
            }

            addonZip.file("textures/item_texture.json", JSON.stringify(itemTex, null, 4));
            
            generatedZip = addonZip;
            log.innerText += `\n>> 成功: 構造の構築が完了しました。`;
            downloadBtn.disabled = false;
        } catch (e) {
            log.innerText += "\n[ERROR] " + e.message;
        }
    }

    async function downloadAddon() {
        const b = await generatedZip.generateAsync({type:"blob"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(b);
        a.download = `${modDisplayName}.mcpack`;
        a.click();
    }
</script>
</body>
</html>
