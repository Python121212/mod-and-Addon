<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Java to Bedrock Converter - Phase 1.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --primary: #3498db; --bg: #1a1a2e; --card: #16213e; --text: #e94560; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); padding: 40px; }
        .container { max-width: 800px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { border-left: 5px solid var(--text); padding-left: 15px; margin-bottom: 30px; }
        .box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input[type="file"] { margin-bottom: 15px; }
        .btn-group { display: flex; gap: 10px; }
        button { background: var(--text); color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #555; }
        #status { margin: 20px 0; font-size: 14px; color: #aaa; }
        #output { background: #0f3460; color: #00ffc3; padding: 15px; border-radius: 5px; white-space: pre-wrap; font-family: 'Consolas', monospace; font-size: 12px; max-height: 250px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1>MOD変換実験室 - Texture Mapper</h1>
    
    <div class="box">
        <input type="file" id="modFile" accept=".jar">
        <div class="btn-group">
            <button onclick="processMod()">1. 解析 & テクスチャ抽出</button>
            <button id="downloadBtn" onclick="downloadAddon()" disabled>2. .mcpackを保存</button>
        </div>
    </div>

    <div id="status">JARファイルをアップロードしてください...</div>
    
    <div id="output">// 解析結果のログがここに表示されます</div>
</div>

<script>
    let generatedZip = null;
    let modDisplayName = "converted_addon";

    async function processMod() {
        const fileInput = document.getElementById('modFile');
        const output = document.getElementById('output');
        const status = document.getElementById('status');
        const downloadBtn = document.getElementById('downloadBtn');

        if (!fileInput.files[0]) return alert("ファイルを選択してください");

        try {
            status.innerText = "⏳ JARを解析中...";
            const javaZip = await JSZip.loadAsync(fileInput.files[0]);
            const addonZip = new JSZip();
            let log = "--- 変換ログ ---\n";

            // 1. mods.toml の解析
            const tomlFile = javaZip.file(/mods\.toml$/i)[0];
            if (!tomlFile) throw new Error("mods.tomlが見つかりません");
            const tomlText = await tomlFile.async("string");
            
            const modId = tomlText.match(/modId\s*=\s*["']([^"']+)["']/)?.[1] || "unknown";
            modDisplayName = tomlText.match(/displayName\s*=\s*["']([^"']+)["']/)?.[1] || modId;
            log += `[MOD検出] ${modDisplayName} (${modId})\n`;

            // 2. manifest.json 作成
            const manifest = {
                "format_version": 2,
                "header": {
                    "name": modDisplayName,
                    "description": `Converted: ${modId}`,
                    "uuid": crypto.randomUUID(),
                    "version": [1, 0, 0],
                    "min_engine_version": [1, 21, 0]
                },
                "modules": [{ "type": "resources", "uuid": crypto.randomUUID(), "version": [1, 0, 0] }]
            };
            addonZip.file("manifest.json", JSON.stringify(manifest, null, 4));

            // 3. テクスチャの自動マッピング
            status.innerText = "🖼️ テクスチャを抽出・配置中...";
            const files = javaZip.files;
            let texCount = 0;

            for (const path in files) {
                if (path.endsWith(".png")) {
                    const blob = await files[path].async("blob");
                    let newPath = "";

                    // アイコンの処理
                    if (path.toLowerCase().endsWith("icon.png")) {
                        newPath = "pack_icon.png";
                    } 
                    // テクスチャの振り分け
                    else if (path.includes("/textures/item/")) {
                        newPath = "textures/items/" + path.split('/').pop();
                    } 
                    else if (path.includes("/textures/block/")) {
                        newPath = "textures/blocks/" + path.split('/').pop();
                    } 
                    else if (path.includes("/textures/gui/")) {
                        newPath = "textures/gui/" + path.split('/').pop();
                    }

                    if (newPath) {
                        addonZip.file(newPath, blob);
                        log += `[配置] ${path} -> ${newPath}\n`;
                        texCount++;
                    }
                }
            }

            log += `\n合計 ${texCount} 個の画像を処理しました。\n`;
            generatedZip = addonZip;
            output.innerText = log + "\n--- manifest.json ---\n" + JSON.stringify(manifest, null, 4);
            status.innerText = "✅ 完了！アドオンのパッケージが整いました。";
            downloadBtn.disabled = false;

        } catch (err) {
            status.innerText = "❌ エラー: " + err.message;
            console.error(err);
        }
    }

    async function downloadAddon() {
        if (!generatedZip) return;
        const blob = await generatedZip.generateAsync({ type: "blob" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${modDisplayName.replace(/\s+/g, '_')}.mcpack`;
        a.click();
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
