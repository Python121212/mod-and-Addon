<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MOD Engine v3.7 - Hard Overwrite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --danger: #ff3e3e; --bg: #050505; }
        body { background: var(--bg); color: var(--danger); font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .panel { border: 2px solid var(--danger); padding: 25px; display: inline-block; border-radius: 10px; background: #111; width: 90%; max-width: 600px; }
        button { background: var(--danger); color: #fff; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; border-radius: 5px; }
        #console { margin-top: 15px; color: #fff; font-size: 10px; text-align: left; height: 150px; overflow-y: scroll; background: #000; border: 1px solid #333; padding: 10px; }
    </style>
</head>
<body>

<div class="panel">
    <h2>HARD OVERWRITE v3.7</h2>
    <p style="font-size:11px;">[物理パス強制上書きモデル]</p>
    
    <input type="file" id="modFile" accept=".jar">
    <button onclick="buildHardPack()">強制上書きパックを生成</button>
    
    <div id="console">ログ: 待機中...</div>
</div>

<script>
    async function buildHardPack() {
        const fileInput = document.getElementById('modFile');
        const consoleLog = document.getElementById('console');
        if (!fileInput.files[0]) return;

        consoleLog.innerHTML = "> 強制構築開始...<br>";
        const jar = await JSZip.loadAsync(fileInput.files[0]);
        const addon = new JSZip();
        
        // 1. マニフェスト (UUIDを刷新)
        const manifest = {
            "format_version": 2,
            "header": { "name": "Hard_Overwrite_" + Date.now(), "uuid": crypto.randomUUID(), "version": [1,0,0], "min_engine_version": [1,21,0] },
            "modules": [{ "type": "resources", "uuid": crypto.randomUUID(), "version": [1,0,0] }]
        };
        addon.file("manifest.json", JSON.stringify(manifest));

        let soundDefs = { "format_version": "1.14.0", "sound_definitions": {} };

        for (const path in jar.files) {
            if (path.endsWith(".ogg")) {
                const blob = await jar.files[path].async("blob");
                
                // Javaのパスを解析
                const rawPath = path.replace(/assets\/[^\/]+\/sounds\//, ""); 
                
                // 統合版が「物理的」に音を探しに行く場所に直接置く
                // 例: sounds/dig/stone1.ogg, sounds/step/grass1.ogg
                const destPath = "sounds/" + rawPath.toLowerCase();
                addon.file(destPath, blob);

                // イベント名も登録（二段構え）
                let eventName = rawPath.replace(".ogg", "").replace(/\//g, ".");
                soundDefs.sound_definitions[eventName] = {
                    "category": "neutral",
                    "sounds": [{ "name": destPath.replace(".ogg", ""), "stream": blob.size > 200000 }]
                };
                
                consoleLog.innerHTML += `Overwrite: ${destPath}<br>`;
            }
        }
        
        addon.file("sound_definitions.json", JSON.stringify(soundDefs, null, 4));

        const content = await addon.generateAsync({ type: "blob", compression: "STORE", mimeType: "application/octet-stream" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(content);
        a.download = "HardSoundFix.mcpack"; 
        a.click();
        consoleLog.innerHTML += `> ✅ 完了。全ての音を物理パスに配置しました。`;
    }
</script>
</body>
</html>
