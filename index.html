<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOD Engine v2.5 - Logic Transpiler Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --js-color: #f7df1e; --java-color: #ed8b00; --bg: #0d1117; --panel: #161b22; }
        body { font-family: 'Fira Code', monospace; background: var(--bg); color: #c9d1d9; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; background: #010409; border-bottom: 2px solid var(--js-color); display: flex; justify-content: space-between; align-items: center; }
        .main { display: grid; grid-template-columns: 1fr 1fr; flex-grow: 1; gap: 2px; background: #30363d; overflow: hidden; }
        .editor-container { background: var(--panel); display: flex; flex-direction: column; }
        .label { padding: 10px; font-size: 12px; background: #21262d; font-weight: bold; border-bottom: 1px solid #30363d; }
        textarea { flex-grow: 1; background: #000; color: #88ff88; border: none; padding: 15px; font-size: 13px; resize: none; outline: none; }
        #js-editor { color: var(--js-color); }
        .toolbar { padding: 20px; background: #010409; display: flex; gap: 15px; align-items: center; }
        button { padding: 12px 24px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-convert { background: var(--js-color); color: #000; }
        .btn-download { background: #238636; color: #fff; }
        button:disabled { opacity: 0.2; cursor: not-allowed; }
    </style>
</head>
<body>

<header>
    <div style="color: var(--js-color); font-weight: bold;">MOD LOGIC REBUILDER v2.5</div>
    <div id="status" style="font-size: 12px;">Waiting for Java Source...</div>
</header>

<div class="main">
    <div class="editor-container">
        <div class="label" style="color: var(--java-color);">JAVA SOURCE / CLASS ANALYSIS</div>
        <textarea id="java-input" placeholder="ここにJavaのコードを貼り付けるか、JARを読み込んでください..."></textarea>
    </div>
    <div class="editor-container">
        <div class="label" style="color: var(--js-color);">BEDROCK SCRIPT API (index.js)</div>
        <textarea id="js-editor" spellcheck="false">// 翻訳されたJavaScriptがここに生成されます</textarea>
    </div>
</div>

<div class="toolbar">
    <input type="file" id="modFile" accept=".jar">
    <button class="btn-convert" onclick="runTranspile()">LOGIC TRANSPILE</button>
    <button class="btn-download" id="dlBtn" onclick="savePack()" disabled>SAVE .MCADDON</button>
</div>

<script>
    let finalZip = null;

    function transpileLogic(javaCode) {
        let js = javaCode;

        // 1. 変数宣言の変換 (int, float, double, String -> let/const)
        js = js.replace(/(public|private|protected|static)\s+/g, ""); // 修飾子削除
        js = js.replace(/\b(int|float|double|long|boolean|String|var)\s+(\w+)\s*=/g, "let $2 =");
        
        // 2. 数値リテラルの変換 (1.0f, 20L -> 1.0, 20)
        js = js.replace(/(\d+(\.\d+)?)f/g, "$1");
        js = js.replace(/(\d+)L/g, "$1");

        // 3. 座標計算 (BlockPos -> Vector3)
        // Java: new BlockPos(x, y, z) -> JS: {x: x, y: y, z: z}
        js = js.replace(/new\s+BlockPos\((.*?),(.*?),(.*?)\)/g, "{ x: $1, y: $2, z: $3 }");
        
        // 4. 標準的なメソッドの置換
        js = js.replace(/\.getX\(\)/g, ".x");
        js = js.replace(/\.getY\(\)/g, ".y");
        js = js.replace(/\.getZ\(\)/g, ".z");
        js = js.replace(/System\.out\.println/g, "console.log");

        // 5. Minecraft API のラップ (簡易)
        js = js.replace(/player\.sendMessage\((.*?)\)/g, "player.sendMessage($1)");

        return js;
    }

    async function runTranspile() {
        const fileInput = document.getElementById('modFile');
        const javaInput = document.getElementById('java-input');
        const jsEditor = document.getElementById('js-editor');
        const dlBtn = document.getElementById('dlBtn');

        let sourceCode = javaInput.value;

        // JARが選択されている場合は中身を解析
        if (fileInput.files[0]) {
            const jar = await JSZip.loadAsync(fileInput.files[0]);
            sourceCode = "// --- JAR Analysis Results ---\n";
            for (const path in jar.files) {
                if (path.endsWith(".class") || path.endsWith(".java")) {
                    const content = await jar.files[path].async("string");
                    sourceCode += `\n// File: ${path}\n` + content.substring(0, 500); // 一部を抽出
                }
            }
            javaInput.value = sourceCode;
        }

        // 翻訳実行
        const result = transpileLogic(sourceCode);
        jsEditor.value = `import { world, system } from "@minecraft/server";\n\n${result}`;
        
        // アドオンパッケージ化
        const addon = new JSZip();
        addon.file("manifest.json", JSON.stringify({
            "format_version": 2,
            "header": { "name": "Logic Transpiled Pack", "uuid": crypto.randomUUID(), "version": [1,0,0], "min_engine_version": [1,21,0] },
            "modules": [{ "type": "script", "language": "javascript", "uuid": crypto.randomUUID(), "version": [1,0,0], "entry": "scripts/main.js" }],
            "dependencies": [{ "module_name": "@minecraft/server", "version": "1.10.0" }]
        }, null, 4));
        addon.file("scripts/main.js", jsEditor.value);
        
        finalZip = addon;
        dlBtn.disabled = false;
        document.getElementById('status').innerText = "TRANSPILE COMPLETE.";
    }

    async function savePack() {
        const b = await finalZip.generateAsync({type:"blob"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(b);
        a.download = "Logic_Transpiled_Mod.mcaddon";
        a.click();
    }
</script>
</body>
</html>
